name: Database back-up

# Maakt elke nacht een volledige dump van de Supabase-database en bewaart
# die als artifact (te downloaden via het Actions-tabblad). Raakt de repo
# of de live-app niet aan.
#
# Verbindt via losse parameters plus PGPASSWORD, zodat speciale tekens in
# het wachtwoord nooit de verbinding kunnen breken. Faalt hard (rood) als
# de dump leeg is, zodat een mislukte back-up niet als groen wordt gemeld.

on:
  schedule:
    - cron: "0 2 * * *" # elke nacht 02:00 UTC
  workflow_dispatch: {} # handmatig starten kan ook

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Postgres 17-client installeren
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Database dumpen
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -o pipefail
          mkdir -p backups
          DATUM=$(date -u +%Y-%m-%d_%H%M)
          BESTAND="backups/revisio-$DATUM.sql.gz"
          pg_dump \
            -h aws-0-eu-west-1.pooler.supabase.com \
            -p 5432 \
            -U postgres.ntcbrqoesjlgiawmkdsa \
            -d postgres \
            --no-owner --no-privileges | gzip > "$BESTAND"
          ls -lh backups
          GROOTTE=$(stat -c%s "$BESTAND")
          echo "Back-up grootte: $GROOTTE bytes"
          if [ "$GROOTTE" -lt 1000 ]; then
            echo "FOUT: de back-up is te klein, de dump is waarschijnlijk mislukt."
            exit 1
          fi

      - name: Back-up bewaren als artifact (90 dagen)
        uses: actions/upload-artifact@v4
        with:
          name: revisio-db-backup
          path: backups/*.sql.gz
          retention-days: 90
