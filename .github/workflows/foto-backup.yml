name: Foto back-up naar Backblaze B2

# Haalt wekelijks alle foto's/tekeningen uit de Supabase-buckets en kopieert
# ze naar Backblaze B2. We gebruiken 'rclone copy' (niet sync): bestaande
# bestanden worden overgeslagen, nieuwe toegevoegd, en NOOIT iets verwijderd.
# Zo blijft een per ongeluk in Supabase gewiste foto in de back-up staan.

on:
  schedule:
    - cron: "0 3 * * 0" # elke zondag 03:00 UTC
  workflow_dispatch: {} # handmatig starten kan ook

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Foto's uit Supabase downloaden
        env:
          SUPABASE_URL: https://ntcbrqoesjlgiawmkdsa.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scripts/backup-fotos.py

      - name: Grootte tonen
        run: du -sh foto-backup || true

      - name: rclone installeren
        run: |
          sudo -v
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Kopieren naar Backblaze B2
        env:
          RCLONE_CONFIG_B2_TYPE: b2
          RCLONE_CONFIG_B2_ACCOUNT: ${{ secrets.B2_KEY_ID }}
          RCLONE_CONFIG_B2_KEY: ${{ secrets.B2_APP_KEY }}
        run: |
          rclone copy foto-backup "b2:revisio-foto-backup" --transfers 8 --fast-list -v
          echo "Back-up naar B2 klaar."
