<!DOCTYPE html>
<html lang="nl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carburateur Hub — Deel 1 (controle)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Karma:wght@400;500;600;700&display=swap');
  :root{--g-dark:#1c4a37;--g-mid:#2f8f5b;--g-deep:#277a4d;--brass:#b8893a;
    --soft:#f6faf8;--border:#dceae2;--ink:#27332e;--muted:#5f7068;
    --serif:'Karma',Georgia,serif;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;}
  *{box-sizing:border-box;}
  body{margin:0;background:#eef3f0;color:var(--ink);font-family:var(--sans);}
  .wrap{max-width:1000px;margin:0 auto;padding:0 16px 60px;}
  header.top{background:var(--g-dark);color:#fff;padding:22px 0 26px;}
  .brand{font-family:var(--serif);font-weight:700;font-size:27px;}
  .brand small{display:block;font-family:var(--sans);font-weight:400;font-size:13px;color:#bfe0cf;margin-top:2px;}
  .searchbar{margin-top:18px;display:flex;gap:10px;align-items:center;background:#fff;border-radius:12px;padding:11px 14px;box-shadow:0 8px 24px rgba(10,40,25,.18);}
  .searchbar input{border:0;outline:0;font-size:17px;width:100%;font-family:var(--sans);color:var(--ink);background:transparent;}
  .count{color:#bfe0cf;font-size:13px;margin-top:10px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:22px;}
  .card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 16px 16px;cursor:pointer;transition:transform .15s,box-shadow .2s,border-color .2s;}
  .card:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(20,60,40,.12);border-color:#c7dccf;}
  .card .type{font-family:var(--serif);font-weight:700;color:var(--g-dark);font-size:20px;}
  .card .veh{font-weight:600;margin-top:2px;}
  .card .eng{color:var(--muted);font-size:13.5px;margin-top:4px;}
  .badges{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;}
  .badge{font-size:11.5px;background:var(--soft);border:1px solid var(--border);color:var(--g-deep);border-radius:20px;padding:3px 9px;font-variant-numeric:tabular-nums;}
  .badge.brass{color:#8a6320;border-color:#ecdcc0;background:#fbf4e8;}
  .detail{display:none;margin-top:22px;}
  .back{background:none;border:0;color:var(--g-deep);font-size:15px;cursor:pointer;padding:6px 0;font-family:var(--sans);}
  .dhead{font-family:var(--serif);font-weight:700;color:var(--g-dark);font-size:28px;margin:6px 0 2px;}
  .dveh{font-weight:600;font-size:17px;}
  .deng{color:var(--muted);margin-top:3px;}
  .reg{color:var(--muted);font-size:12.5px;margin-top:6px;}
  .panel{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;margin-top:16px;}
  .panel h3{font-family:var(--serif);color:var(--g-dark);margin:0 0 12px;font-size:18px;font-weight:600;}
  table.specs{width:100%;border-collapse:collapse;font-size:14.5px;}
  table.specs th,table.specs td{text-align:left;padding:8px 10px;border-bottom:1px solid #eef3f0;vertical-align:top;}
  table.specs thead th{color:var(--g-deep);font-weight:600;}
  .sym{color:var(--brass);font-weight:700;width:34px;}
  .val{font-variant-numeric:tabular-nums;font-weight:600;}
  .vtab{width:100%;border-collapse:collapse;font-size:14px;}
  .vtab th,.vtab td{text-align:left;padding:7px 10px;border-bottom:1px solid #eef3f0;}
  .note{background:#fbf4e8;border:1px solid #ecdcc0;color:#8a6320;border-radius:10px;padding:10px 12px;margin-top:14px;font-size:13.5px;}
  .langtoggle{float:right;display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .langtoggle button{border:0;background:#fff;color:var(--muted);font-size:12.5px;padding:6px 11px;cursor:pointer;border-left:1px solid var(--border);}
  .langtoggle button:first-child{border-left:0;}
  .langtoggle button.on{background:var(--g-dark);color:#fff;}
</style></head>
<body>

  <div class="searchbar">

  </div>
  <div class="count" id="count"></div>

<div class="wrap">

let lang=2; // 0=en 1=de 2=nl
function norm(s){return (s||"").toString().toUpperCase().replace(/\s+/g,"");}
function render(){
  const q=norm(document.getElementById('q').value);
  const list=CARBS.filter(c=>{
    if(!q)return true;
    const hay=norm(c.type+" "+c.vehicle+" "+c.registrier+" "+(c.tag_norm||[]).join(" ")+" "+c.variants.map(v=>v.tag).join(" "));
    return hay.includes(q);
  });
  document.getElementById('count').textContent=list.length+" van "+CARBS.length+" kennbladen";
  document.getElementById('grid').innerHTML=list.map(c=>`
    <div class="card" onclick="open_('${c.id}')">
      <div class="type">${c.type}</div>
      <div class="veh">${c.vehicle}</div>
      <div class="eng">${c.engine}</div>
      <div class="badges">${c.variants.map(v=>`<span class="badge brass">${v.tag}</span>`).join("")}
        <span class="badge">Reg. ${c.registrier}</span></div>
    </div>`).join("");
  document.getElementById('grid').style.display='grid';
  document.getElementById('detail').style.display='none';
}
function setLang(l){lang=l;const c=window._cur;if(c)open_(c);}
function open_(id){
  window._cur=id;
  const c=CARBS.find(x=>x.id===id);
  const ln=['EN','DE','NL'];
  const specRows=ORDER.map(k=>{const L=LABELS[k];const v=c.werte[k];if(!v)return"";return `<tr><td class="sym">${L[3]||""}</td><td>${L[lang]}</td><td class="val">${v}</td></tr>`}).join("");
  const varRows=c.variants.map(v=>`<tr><td>${v.name}</td><td class="val">${v.tag}</td><td>${v.bestel}</td><td>${v.kleur}</td></tr>`).join("");
  document.getElementById('detail').innerHTML=`
    <button class="back" onclick="render()">&larr; terug naar overzicht</button>
    <div class="dhead">${c.type}</div>
    <div class="dveh">${c.vehicle}</div>
    <div class="deng">${c.engine} · ${c.yearFrom}</div>
    <div class="reg">Registrier-Nr ${c.registrier} · Pierburg · bronbladen ${c.bron_sheets.join(" & ")}</div>
    <div class="panel"><h3>Uitvoeringen &amp; tags</h3>
      <table class="vtab"><thead><tr><th>Uitvoering</th><th>Tag (Typenschild)</th><th>Bestel-nr</th><th>Kleur</th></tr></thead>
      <tbody>${varRows}</tbody></table></div>
    <div class="panel">
      <div class="langtoggle">${ln.map((x,i)=>`<button class="${i===lang?'on':''}" onclick="setLang(${i})">${x}</button>`).join("")}</div>
      <h3>Normaalinstelling</h3>
      <table class="specs"><thead><tr><th class="sym"></th><th>${['Setting','Bezeichnung','Onderdeel'][lang]}</th><th>${['Value','Wert','Waarde'][lang]}</th></tr></thead>
      <tbody>${specRows}</tbody></table>
      ${c.controle?`<div class="note">⚠ Controle: ${c.controle}</div>`:""}
    </div>`;
  document.getElementById('grid').style.display='none';
  document.getElementById('detail').style.display='block';
  window.scrollTo(0,0);
}
render();
</script>
</body></html>
